# Bidwright launcher compose — pulls prebuilt images from GHCR.
#
# This file is shipped inside the standalone launcher zip. It is fully
# decoupled from the dev (../../docker-compose.yml) and prod
# (../../docker-compose.prod.yml) compose files.
#
# Override the registry path or tag with BIDWRIGHT_REGISTRY / BIDWRIGHT_TAG
# in .env if you want to pin to a specific version.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bidwright
      POSTGRES_PASSWORD: bidwright
      POSTGRES_DB: bidwright
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidwright -d bidwright"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "curl -sf -X POST http://ollama:11434/api/pull
             -d '{\"name\":\"snowflake-arctic-embed\"}'
             && echo 'Embedding model ready'"

  db-migrate:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-api:${BIDWRIGHT_TAG:-latest}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://bidwright:bidwright@postgres:5432/bidwright"
    restart: "no"
    command: ["pnpm", "--filter", "@bidwright/db", "db:push"]

  api:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-api:${BIDWRIGHT_TAG:-latest}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://bidwright:bidwright@postgres:5432/bidwright"
      REDIS_URL: "redis://redis:6379"
      DATA_DIR: "/data"
      API_PORT: "3001"
      CLAUDE_CONFIG_DIR: "/root/.claude"
      CODEX_HOME: "/root/.codex"
      EMBEDDING_PROVIDER: "local"
      EMBEDDING_BASE_URL: "http://ollama:11434/v1"
      EMBEDDING_MODEL: "snowflake-arctic-embed"
      EMBEDDING_DIMENSIONS: "1024"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}"
    volumes:
      - bidwright_data:/data
      - agent_claude:/root/.claude
      - agent_codex:/root/.codex
    ports:
      - "${API_PUBLIC_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-web:${BIDWRIGHT_TAG:-latest}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}"
      INTERNAL_API_BASE_URL: "http://api:3001"
    ports:
      - "${WEB_PUBLIC_PORT:-3000}:3000"

  worker:
    image: "${BIDWRIGHT_REGISTRY:-ghcr.io/braedonsaunders}/bidwright-worker:${BIDWRIGHT_TAG:-latest}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://bidwright:bidwright@postgres:5432/bidwright"
      REDIS_URL: "redis://redis:6379"
      DATA_DIR: "/data"
      EMBEDDING_PROVIDER: "local"
      EMBEDDING_BASE_URL: "http://ollama:11434/v1"
      EMBEDDING_MODEL: "snowflake-arctic-embed"
      EMBEDDING_DIMENSIONS: "1024"
    volumes:
      - bidwright_data:/data

volumes:
  pgdata:
  redisdata:
  ollama_data:
  bidwright_data:
  agent_claude:
  agent_codex:
