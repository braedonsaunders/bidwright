version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: bidwright
      POSTGRES_PASSWORD: bidwright
      POSTGRES_DB: bidwright
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidwright -d bidwright"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bidwright:bidwright@postgres:5432/bidwright
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
      API_PORT: "3001"
    volumes:
      - filedata:/data
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bidwright:bidwright@postgres:5432/bidwright
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
      API_PORT: "3001"
    volumes:
      - filedata:/data

volumes:
  pgdata:
  redisdata:
  filedata:
