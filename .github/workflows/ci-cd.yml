name: CI / CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # Detect whether anything outside docs/README changed. Used to gate the
  # publish + deploy jobs so a README-only push doesn't rebuild images
  # or redeploy prod.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!README.md'
              - '!docs/**'
              - '!.github/codeflow-card.svg'
              - '!.github/workflows/codeflow-card.yml'
              - '!**/*.md'

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @bidwright/db db:generate

      - name: Typecheck web
        run: pnpm --filter @bidwright/web exec tsc --noEmit

      - name: Typecheck API
        run: pnpm --filter @bidwright/api exec tsc --noEmit

      - name: Typecheck worker
        run: pnpm --filter @bidwright/worker exec tsc --noEmit

      - name: Build API
        run: pnpm --filter @bidwright/api build

      - name: Build worker
        run: pnpm --filter @bidwright/worker build

      - name: Build web
        run: pnpm --filter @bidwright/web build

      - name: Run schedule unit tests
        run: pnpm exec tsx --test apps/web/lib/schedule-utils.test.ts

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config > /dev/null

      - name: Validate production registry compose
        run: docker compose -f docker-compose.prod-registry.yml config > /dev/null

      - name: Validate launcher compose
        run: docker compose -f scripts/launcher/docker-compose.yml config > /dev/null

  publish:
    needs:
      - verify
      - changes
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
      && needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: Dockerfile.api
          - service: web
            dockerfile: Dockerfile.web
          - service: worker
            dockerfile: Dockerfile.worker
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner_lc }}/bidwright-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

  deploy:
    needs:
      - verify
      - publish
      - changes
    # Deploys run from a self-hosted runner that can reach the configured target host.
    runs-on: [self-hosted, linux, x64, bidwright-prod]
    timeout-minutes: 40
    environment: production
    if: >
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        vars.ENABLE_SERVER_DEPLOY == 'true'))
      && needs.changes.outputs.code == 'true'
    concurrency:
      group: bidwright-production-deploy
      cancel-in-progress: false

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_BASE: ${{ vars.DEPLOY_BASE || '/opt/bidwright' }}
      DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '/opt/bidwright/.env.server' }}
      DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.DEPLOY_COMPOSE_PROJECT_NAME || 'bidwright' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Assert deploy configuration
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Build release bundle
        run: |
          mkdir -p dist
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='data' \
            --exclude='backups' \
            --exclude='tmp' \
            --exclude='.claude' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.turbo' \
            --exclude='apps/web/.next' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            -czf "dist/bidwright-${GITHUB_SHA}.tgz" .

      - name: Upload release bundle
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_BASE/releases/$GITHUB_SHA'"
          scp -P "$DEPLOY_PORT" "dist/bidwright-${GITHUB_SHA}.tgz" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_BASE/releases/$GITHUB_SHA/release.tgz"

      - name: Deploy release on server
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -euo pipefail
            RELEASE_DIR='$DEPLOY_BASE/releases/$GITHUB_SHA'
            mkdir -p \"\$RELEASE_DIR/app\"
            tar -xzf \"\$RELEASE_DIR/release.tgz\" -C \"\$RELEASE_DIR/app\"
            chmod +x \"\$RELEASE_DIR/app/scripts/deploy/remote-deploy.sh\" \"\$RELEASE_DIR/app/scripts/deploy/restore-server-state.sh\"
            # If the env file pins BIDWRIGHT_TAG (registry mode), point it at this commit's image.
            # Build mode doesn't carry that line and is left untouched.
            if grep -q '^BIDWRIGHT_TAG=' '$DEPLOY_ENV_FILE'; then
              sed -i 's/^BIDWRIGHT_TAG=.*/BIDWRIGHT_TAG=sha-$SHORT_SHA/' '$DEPLOY_ENV_FILE'
            fi
            DEPLOY_BASE='$DEPLOY_BASE' \
            ENV_FILE='$DEPLOY_ENV_FILE' \
            COMPOSE_PROJECT_NAME='$DEPLOY_COMPOSE_PROJECT_NAME' \
            \"\$RELEASE_DIR/app/scripts/deploy/remote-deploy.sh\"
          "
